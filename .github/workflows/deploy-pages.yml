name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /${{ github.event.repository.name }}/
      VITE_SYNONYM_PROVIDER: ${{ vars.VITE_SYNONYM_PROVIDER }}
      VITE_MERRIAM_WEBSTER_API_KEY: ${{ vars.VITE_MERRIAM_WEBSTER_API_KEY }}
      VITE_TMDB_API_TOKEN: ${{ vars.VITE_TMDB_API_TOKEN }}
      VITE_TMDB_LANGUAGE: ${{ vars.VITE_TMDB_LANGUAGE }}
      VITE_TMDB_REGION: ${{ vars.VITE_TMDB_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build configuration
        shell: bash
        run: |
          if [[ "$VITE_SYNONYM_PROVIDER" == "merriam-webster" && -z "$VITE_MERRIAM_WEBSTER_API_KEY" ]]; then
            echo "::error::VITE_MERRIAM_WEBSTER_API_KEY is required when VITE_SYNONYM_PROVIDER=merriam-webster"
            exit 1
          fi

      - name: Build for GitHub Pages
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
